<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a{
            color: red;
            text-decoration: none;
            font-weight: bold;

        }

        a:visited {
            color: darkred;
        }

        a:hover{
            color: black;
            text-decoration: underline;    
        }

        a:active {
            color: yellow;
        }
        a::after {
            content:" [link]";
            text-decoration: none;
            font-weight: normal;
            color: grey;
        }

        a::after {
            content: " ←"; 
        }

        .especial {
            background-color: rgba(237, 146, 146, 0.545);
        }

        a

    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <li><a href="https://github.com/gustavoguanabara" target="_blank" class="especial">Repositorio do GitHub</a></link></li>
    <li><a href="https://youtube.com/CursoemVideo" target="_blank">Canal do Youtube</a></li> 
    <li><a href="https://www.cursoemvideo.com/" target="_blank">Site do Curso em Video</a></li>  
</body>
</html>
